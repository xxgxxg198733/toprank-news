name: TopRank News Generator

on:
  schedule:
    # 0:00 UTC = 8:00 AM Beijing (CST)
    # 4:00 UTC = 12:00 PM Beijing
    # 11:00 UTC = 7:00 PM Beijing
    # China Standard Time = UTC+8, no DST
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment
        run: |
          echo "Python version: $(python3 --version)"
          echo "Working dir: $(pwd)"
          echo "Files in scripts/:"
          ls -la scripts/
          echo "Commit SHA: $(git log -1 --format=%H)"

      - name: Generate news articles
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push changes
        run: |
          git config user.name "TopRank Bot"
          git config user.email "bot@top.zicisi.fun"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: 10 hot news $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push
