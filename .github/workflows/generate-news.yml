name: TopRank News Generator

on:
  schedule:
    # Update window: Beijing 20:00 - 07:00 (next day)
    # In UTC (UTC+8): 12:00 - 23:00
    # 12:00 UTC = 20:00 Beijing — evening update
    # 16:00 UTC = 00:00 Beijing — midnight refresh
    # 20:00 UTC = 04:00 Beijing — overnight
    # 23:00 UTC = 07:00 Beijing — final update before pause
    #
    # Beijing 07:00-20:00 (UTC 23:00-12:00): NO updates
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
    - cron: '0 20 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment
        run: |
          echo "Python version: $(python3 --version)"
          echo "Working dir: $(pwd)"
          echo "Files in scripts/:"
          ls -la scripts/
          echo "Commit SHA: $(git log -1 --format=%H)"

      - name: Generate news articles
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push changes
        run: |
          git config user.name "TopRank Bot"
          git config user.email "bot@top.zicisi.fun"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: 10 hot news $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push
